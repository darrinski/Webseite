<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <title>Darren Sutter · Mediamatiker</title>
  <meta name="description" content="Darren Jos Sutter, Mediamatiker mit Fokus auf Video, Foto und Design / Branding." />
  <link rel="canonical" href="https://darrensutter.com/" />
  <meta name="robots" content="index, follow" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Darren Sutter · Mediamatiker" />
  <meta property="og:description" content="Portfolio von Darren Sutter, Mediamatiker mit Fokus auf Video, Foto und Design / Branding." />
  <meta property="og:url" content="https://darrensutter.com/" />
  <meta property="og:image" content="https://darrensutter.com/assets/img/silhouette-sitzend-web.jpg" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo+Expanded:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body class="page-home">
  <!-- ============ LOADINGSCREEN ============ -->
  <div id="loader" aria-hidden="true">
    <div class="ld-panel ld-top"></div>
    <div class="ld-panel ld-bottom"></div>
    <div class="ld-content">
      <div class="ld-bar">
        <span class="ld-fill"></span>
        <span class="ld-pct">0%</span>
      </div>
    </div>
  </div>

  <!-- ============ HEADER / NAV ============ -->
  <header class="site-header">
    <a href="index.html" class="logo">DS</a>
    <nav class="nav">
      <a href="work.html">Selected Work</a>
      <a href="about.html">About</a>
    </nav>
  </header>

  <main>
    <!-- ============ HERO ============ -->
    <section class="hero" id="top">
      <div class="hero-grid">

        <!-- TEXT -->
        <div class="hero-text">
          <span class="kicker-accent">(Home) Mediamatiker</span>

          <h1 class="hero-title" aria-label="Darren Sutter">
            <span class="line line--outline">DARREN</span>
            <span class="line line--solid">SUTTER</span>
          </h1>

          <a href="work.html" class="hero-sub hero-sub--link">Video · Foto · Design · Branding</a>
        </div>

        <!-- BILD -->
        <figure class="hero-figure">
          <img src="assets/img/silhouette-sitzend-web.jpg" alt="Darren Sutter Porträt" />
          <figcaption class="hero-fig-cap">Zürich, CH · 47.3769° N, 8.5417° E</figcaption>
        </figure>

      </div>
    </section>
  </main>

  <footer class="site-footer">
    <span>© 2026 Darren Sutter</span>
  </footer>

  <!-- Libraries (CDN — kein Build nötig) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.13/dist/lenis.min.js"></script>
  <script src="script.js"></script>
  <script>
    // Loadingscreen: Prozente langsam -> schnell -> gegen Ende langsam, dann Vorhang
    (function () {
      const loader = document.getElementById('loader');
      if (!loader) return;
      const fill = loader.querySelector('.ld-fill');
      const pct = loader.querySelector('.ld-pct');

      document.documentElement.style.overflow = 'hidden';
      if (typeof lenis !== 'undefined' && lenis) lenis.stop();

      const duration = 2700;
      // easeInOutQuart: langsamer Start, schnelle Mitte, sanftes Auslaufen gegen Ende
      const ease = (t) => (t < 0.5 ? 8 * t * t * t * t : 1 - Math.pow(-2 * t + 2, 4) / 2);

      function run() {
        const start = performance.now();
        function step(now) {
          const t = Math.min(1, (now - start) / duration);
          const p = ease(t) * 100;
          fill.style.width = p + '%';
          pct.style.left = p + '%';
          pct.textContent = Math.round(p) + '%';
          if (t < 1) requestAnimationFrame(step);
          else finish();
        }
        requestAnimationFrame(step);
      }

      function finish() {
        loader.classList.add('fade');           // Balken + Prozent ausblenden
        setTimeout(() => {
          loader.classList.add('done');         // Vorhang öffnet sich
          document.documentElement.style.overflow = '';
          if (typeof lenis !== 'undefined' && lenis) lenis.start();
          setTimeout(() => loader.remove(), 950);
        }, 450);
      }

      // Erst starten, wenn die Webseiten-Schrift (Anton) geladen ist
      let started = false;
      const begin = () => { if (!started) { started = true; run(); } };
      if (document.fonts && document.fonts.load) {
        document.fonts.load('1em "Anton"').then(begin).catch(begin);
        setTimeout(begin, 700); // Fallback, falls die Schrift langsam lädt
      } else {
        begin();
      }
    })();
  </script>
</body>
</html>
